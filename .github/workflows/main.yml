name: 📊 ETF 시세 자동 업데이트

on:
  schedule:
    - cron: '40 6 * * 1-5'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v3
      
      - name: Python 설정
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: 의존성 설치
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install yfinance pandas requests
      
      - name: 시세 수집
        run: |
          python << 'EOF'
          import json
          from datetime import datetime, timedelta
          import yfinance as yf
          
          my_etfs = ['476800.KS','0008S0.KS','0052D0.KS','498410.KS','466940.KS','498400.KS','489030.KS','475720.KS','474220.KS','441680.KS','482730.KS','458760.KS','088980.KS','0086B0.KS','352540.KS','0089D0.KS','0098N0.KS','0097L0.KS','0105E0.KS','329200.KS','481060.KS','0153K0.KS','433970.KS','0025N0.KS','486290.KS']
          
          master = {}
          
          try:
              with open('prices.json', 'r') as f:
                  master = json.load(f)
          except:
              pass
          
          for code in my_etfs:
              try:
                  df = yf.download(code, period='60d', progress=False)
                  if df.empty:
                      continue
                  
                  for i in range(1, len(df)):
                      date = df.index[i].strftime('%Y-%m-%d')
                      if date not in master:
                          master[date] = {}
                      master[date][code.split('.')[0]] = {
                          "today": int(df['Close'].iloc[i]),
                          "prev": int(df['Close'].iloc[i-1]),
                          "src": "Python"
                      }
                  print(f"✅ {code}")
              except Exception as e:
                  print(f"⚠️ {code}: {str(e)[:30]}")
          
          # 35일만 유지
          limit = (datetime.now() - timedelta(days=35)).strftime('%Y-%m-%d')
          cleaned = {d: v for d, v in master.items() if d >= limit}
          result = dict(sorted(cleaned.items(), reverse=True))
          
          with open('prices.json', 'w') as f:
              json.dump(result, f, ensure_ascii=False, indent=2)
          
          print(f"\n✅ 완료: {len(result)}일치 데이터")
          EOF
      
      - name: 커밋 및 푸시
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add prices.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "✅ 시세 자동 업데이트: $(date '+%Y-%m-%d %H:%M:%S')" && git push)
