name: 📊 ETF 시세 자동 업데이트

on:
  schedule:
    - cron: '40 6 * * 1-5'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - uses: actions/checkout@v4
        with:
          path: .

      - name: Python 설정
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: 라이브러리 설치
        run: pip install yfinance pandas requests -q

      - name: 시세 수집 및 저장
        run: python update_prices.py

      - name: 커밋 및 푸시
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add prices.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "✅ 시세 업데이트: $(date '+%Y-%m-%d')" && git push)
