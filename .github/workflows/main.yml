name: 📊 ETF 시세 자동 업데이트

on:
  schedule:
    - cron: '40 6 * * 1-5'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Python 설정
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: 라이브러리 설치
        run: pip install yfinance pandas requests -q
      
      - name: 시세 수집 및 저장
        run: python -c "
import json, os, yfinance as yf
from datetime import datetime, timedelta

codes = ['476800.KS','0008S0.KS','0052D0.KS','498410.KS','466940.KS','498400.KS','489030.KS','475720.KS','474220.KS','441680.KS','482730.KS','458760.KS','088980.KS','0086B0.KS','352540.KS','0089D0.KS','0098N0.KS','0097L0.KS','0105E0.KS','329200.KS','481060.KS','0153K0.KS','433970.KS','0025N0.KS','486290.KS']
data = {}
try:
    with open('prices.json', 'r') as f:
        data = json.load(f)
except:
    pass

for code in codes:
    try:
        df = yf.download(code, period='60d', progress=False)
        for i in range(1, len(df)):
            date = df.index[i].strftime('%Y-%m-%d')
            if date not in data:
                data[date] = {}
            data[date][code.split('.')[0]] = {
                'today': int(df['Close'].iloc[i]),
                'prev': int(df['Close'].iloc[i-1]),
                'src': 'Python'
            }
        print(f'✅ {code}')
    except:
        print(f'⚠️ {code}')

limit = (datetime.now() - timedelta(days=35)).strftime('%Y-%m-%d')
result = dict(sorted({d: v for d, v in data.items() if d >= limit}.items(), reverse=True))

with open('prices.json', 'w') as f:
    json.dump(result, f, ensure_ascii=False, indent=2)

print(f'\n✅ 완료: {len(result)}일치')
"
      
      - name: 커밋 및 푸시
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add prices.json 2>/dev/null || true
          git commit -m "✅ 시세 업데이트: $(date '+%Y-%m-%d')" 2>/dev/null || true
          git push 2>/dev/null || true
